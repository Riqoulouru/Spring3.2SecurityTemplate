services:
  postgres:
    image: postgres:18-alpine
    container_name: spring-security-template-postgres
    restart: unless-stopped
    env_file:
      - ../.env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spring_security_template}
      POSTGRES_USER: ${POSTGRES_USER:-spring_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spring_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: ${POSTGRES_DATA_VOLUME:-postgres_data_dev}
