server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring_security_template}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:spring_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:spring_password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.sql.init.platform=${SPRING_SQL_INIT_PLATFORM:postgresql}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

token.signing.key=${TOKEN_SIGNING_KEY:bXktdmVyeS1zZWNyZXQta2V5LTEyMzQ1Njc4OTAxMjM0NTY=}

security.features.refresh-token.enabled=${SECURITY_FEATURE_REFRESH_TOKEN_ENABLED:false}
security.features.refresh-token.expiration-ms=${SECURITY_FEATURE_REFRESH_TOKEN_EXPIRATION_MS:604800000}

security.features.email-verification.enabled=${SECURITY_FEATURE_EMAIL_VERIFICATION_ENABLED:false}
security.features.email-verification.expiration-ms=${SECURITY_FEATURE_EMAIL_VERIFICATION_EXPIRATION_MS:86400000}

security.features.password-reset.enabled=${SECURITY_FEATURE_PASSWORD_RESET_ENABLED:false}
security.features.password-reset.expiration-ms=${SECURITY_FEATURE_PASSWORD_RESET_EXPIRATION_MS:900000}

security.features.audit-log.enabled=${SECURITY_FEATURE_AUDIT_LOG_ENABLED:false}

security.features.rate-limit.enabled=${SECURITY_FEATURE_RATE_LIMIT_ENABLED:false}
security.features.rate-limit.max-attempts=${SECURITY_FEATURE_RATE_LIMIT_MAX_ATTEMPTS:5}
security.features.rate-limit.window-ms=${SECURITY_FEATURE_RATE_LIMIT_WINDOW_MS:60000}
